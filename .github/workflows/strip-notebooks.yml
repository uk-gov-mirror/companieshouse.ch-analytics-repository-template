name: Strip Jupyter outputs

on:
  push:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  strip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install nbformat
      - name: Strip notebook outputs
        run: python tools/strip_notebook_outputs.py
      - name: Commit and push cleaned notebooks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add --all
            git commit -m "chore(ci): strip outputs from notebooks" || echo "nothing to commit"
            git push
          else
            echo "No notebook output to strip"
          fi